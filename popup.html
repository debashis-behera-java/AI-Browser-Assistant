<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="header">
      <h2>🤖 AI Assistant</h2>
      <p>AI Chat • Summarizer • Explainer</p>
    </div>

    <textarea
      id="input"
      placeholder="Ask anything..."
    ></textarea>

    <div class="btn-group">
      <button id="askBtn">🚀 Ask AI</button>
      <button id="summaryBtn">📄 Summarize Page</button>
      <button id="clearBtn">🗑 Clear Chat</button>
    </div>

    <div id="chatContainer">
      <div class="message">
        <div class="ai welcome-message">
  <h3>👋 Welcome!</h3>
  <p>Ask questions, summarize webpages, and explain selected text using Gemini AI.</p>
</div>
      </div>
    </div>

    <div class="footer">
      Developed by Soubhagya
    </div>

  </div>

  <script src="popup.js"></script>

</body>
</html>
